<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>打曱甴 98 - 10關音效修復版</title>
    <style>
        body { background-color: #008080; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: "MingLiU", sans-serif; }
        .window { background: #c0c0c0; border: 2px solid; border-color: #fff #808080 #808080 #fff; padding: 2px; width: 450px; box-shadow: 5px 5px 15px rgba(0,0,0,0.5); }
        .title-bar { background: linear-gradient(90deg, #000080, #1084d0); padding: 4px; color: white; font-weight: bold; font-size: 14px; display: flex; justify-content: space-between; }
        .content { padding: 10px; text-align: center; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; background: #eee; border: 2px inset #808080; padding: 5px; margin-bottom: 10px; font-weight: bold; }
        
        .game-area { width: 400px; height: 350px; background: #fff; border: 2px inset #808080; margin: 0 auto; position: relative; overflow: hidden; }
        
        /* 武器樣式 */
        .cane-mode { cursor: crosshair; }
        .slipper-mode { cursor: pointer; }

        .roach { font-size: 45px; position: absolute; user-select: none; display: none; z-index: 10; cursor: inherit; }
        
        /* 噴汁特效顏色 */
        .splat { position: absolute; background: #32CD32; border-radius: 50%; pointer-events: none; z-index: 5; }

        #mom-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,0,0,0.7); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:100; color: yellow; font-size: 50px; font-weight: bold; text-shadow: 3px 3px #000; text-align: center; }
        .btn { background: #c0c0c0; border: 2px solid; border-color: #fff #808080 #808080 #fff; padding: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
        .active-weapon { background: #808080; color: white; }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar"><span>ROACH_HUNTER_V2.exe</span><div>X</div></div>
    <div class="content">
        <div class="stats">
            <div>關卡: <span id="lv">1</span>/10</div>
            <div>得分: <span id="score">0</span>/10</div>
            <div>時間: <span id="time">25</span>s</div>
        </div>

        <div class="game-area cane-mode" id="game-area">
            <div id="mom-overlay">食飯啦！！！</div>
            <div class="roach" id="roach">🪳</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px;">
            <button class="btn" id="start-btn" onclick="initGame()" style="background:#00ff00;">🔊 1. 啟動並開始</button>
            <select class="btn" id="weapon-select" onchange="changeWeapon(this.value)">
                <option value="cane">武器：藤條</option>
                <option value="slipper">武器：拖鞋</option>
            </select>
        </div>
    </div>
</div>

<script>
    let score = 0, level = 1, timeLeft = 25, isRunning = false;
    let timerId, roachId, audioCtx;
    const momAudio = new Audio('荔枝角道608號 10.m4a'); // 請將檔案改名做 mom.m4a

    function changeWeapon(val) {
        document.getElementById('game-area').className = 'game-area ' + val + '-mode';
    }

    function playSplatSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        g.gain.setValueAtTime(0.2, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function triggerScare() {
        momAudio.play().catch(() => {
            const msg = new SpeechSynthesisUtterance("食飯啦！");
            msg.lang = 'zh-HK';
            window.speechSynthesis.speak(msg);
        });
        document.getElementById('mom-overlay').style.display = 'flex';
        setTimeout(() => document.getElementById('mom-overlay').style.display = 'none', 1000);
    }

    function initGame() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        if (isRunning) return;
        isRunning = true;
        score = 0; level = 1; timeLeft = 25;
        updateDisplay();
        document.getElementById('start-btn').disabled = true;

        timerId = setInterval(() => {
            timeLeft--;
            document.getElementById('time').innerText = timeLeft;
            if (timeLeft <= 0) endGame(false);
        }, 1000);

        roachId = setInterval(() => {
            const r = document.getElementById('roach');
            r.style.display = 'block';
            r.style.left = Math.random() * 340 + 'px';
            r.style.top = Math.random() * 280 + 'px';
            if (Math.random() < 0.1) triggerScare();
        }, 900);
    }

    document.getElementById('roach').addEventListener('mousedown', (e) => {
        if (!isRunning) return;
        score++;
        playSplatSound();
        createSplat(e.clientX, e.clientY);
        document.getElementById('score').innerText = score;
        document.getElementById('roach').style.display = 'none';

        if (score >= 10) {
            if (level < 10) {
                level++;
                score = 0;
                timeLeft = 25;
                updateDisplay();
                alert("過關！進入第 " + level + " 關");
            } else {
                endGame(true);
            }
        }
    });

    function createSplat(x, y) {
        const area = document.getElementById('game-area').getBoundingClientRect();
        for(let i=0; i<8; i++) {
            const s = document.createElement('div');
            s.className = 'splat';
            s.style.width = '8px'; s.style.height = '8px';
            s.style.left = (x - area.left) + 'px';
            s.style.top = (y - area.top) + 'px';
            document.getElementById('game-area').appendChild(s);
            setTimeout(() => {
                s.style.transform = `translate(${(Math.random()-0.5)*50}px, ${(Math.random()-0.5)*50}px)`;
                s.style.opacity = '0';
            }, 10);
            setTimeout(() => s.remove(), 500);
        }
    }

    function endGame(win) {
        clearInterval(timerId); clearInterval(roachId);
        isRunning = false;
        document.getElementById('start-btn').disabled = false;
        alert(win ? "你贏咗喇！" : "時間到，輸咗！");
        location.reload();
    }

    function updateDisplay() {
        document.getElementById('score').innerText = score;
        document.getElementById('lv').innerText = level;
    }
</script>
</body>
</html>
